<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <title>Mazzady - E-commerce Platform</title>
    <base href="/" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes"
    />
    <meta
      name="description"
      content="Mazzady - Professional E-commerce Auction Platform. Buy and sell through live online auctions with secure bidding."
    />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large" />
    <link rel="canonical" href="https://mazzady.works/" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Mazzady - E-commerce Auction Platform" />
    <meta
      property="og:description"
      content="Buy and sell through live online auctions with secure bidding on Mazzady."
    />
    <meta property="og:url" content="https://mazzady.works/" />
    <meta property="og:site_name" content="Mazzady" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mazzady - E-commerce Auction Platform" />
    <meta
      name="twitter:description"
      content="Buy and sell through live online auctions with secure bidding on Mazzady."
    />
    <link rel="icon" type="image/x-icon" href="lo.png" />

    <!-- Critical CSS for faster FCP -->
    <style>
      /* Critical CSS - Inline for faster rendering */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        min-height: 100vh;
        width: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
        background: #161616;
        color: #fff;
        overflow-x: hidden;
      }
      .app-loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #161616;
        z-index: 9999;
      }
      .app-loading-spinner {
        width: 50px;
        height: 50px;
        border: 3px solid #333;
        border-top-color: #d4af37;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      .app-loading-text {
        margin-top: 16px;
        color: #d4af37;
        font-size: 14px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      /* Reserve space for Font Awesome icons to prevent CLS */
      .fas,
      .fab,
      .far,
      .fa-solid,
      .fa-regular,
      .fa-brands,
      .fa {
        display: inline-block;
        width: 1em;
        height: 1em;
        line-height: 1;
        text-align: center;
        vertical-align: -0.125em;
      }
      /* Enforce font-display: swap on Font Awesome */
      @font-face {
        font-family: 'Font Awesome 6 Free';
        font-display: swap;
      }
      @font-face {
        font-family: 'Font Awesome 6 Brands';
        font-display: swap;
      }
      /* Prevent image CLS */
      img {
        max-width: 100%;
        height: auto;
      }
    </style>

    <!-- Preconnect for external resources -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
    <!-- API preconnect for faster first request -->
    <link rel="preconnect" href="https://mazzady-backend-6e70bb7a3b34.herokuapp.com" crossorigin />
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com" />
    <link rel="dns-prefetch" href="https://mazzady-backend-6e70bb7a3b34.herokuapp.com" />
    <meta name="theme-color" content="#161616" />

    <!-- Google & Facebook SDKs loaded on-demand in auth components for better performance -->

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Mazzady",
        "description": "Professional E-commerce Auction Platform with live bidding",
        "url": "https://mazzady.works/",
        "applicationCategory": "ShoppingApplication",
        "operatingSystem": "Web"
      }
    </script>

    <!-- Font Awesome CSS (Async Loading) -->
    <link
      rel="preload"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      as="style"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      />
    </noscript>
  </head>

  <body>
    <!-- Loading indicator shown while Angular bootstraps -->
    <app-root>
      <div class="app-loading">
        <div class="app-loading-spinner"></div>
        <div class="app-loading-text">Loading Mazzady...</div>
      </div>
    </app-root>
  </body>
</html>
